services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-techlytics_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USER:-tech_user}
      MYSQL_PASSWORD: ${DB_PASS:-tech_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      target: development
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-tech_user}
      - DB_PASS=${DB_PASS:-tech_pass}
      - DB_NAME=${DB_NAME:-techlytics_db}
      - PORT=${PORT:-5000}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      target: development
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000

volumes:
  mysql_data:
